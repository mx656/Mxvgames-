<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚔️ Call of Conquest – mxvgames</title>
    <style>
        :root {
            --bg: #0a0a1a; --card: #1a1a3e; --accent: #ef4444;
            --gold: #f59e0b; --text: #e2e8f0; --text2: #94a3b8;
            --player: #3b82f6; --ally: #22c55e; --enemy: #ef4444; --neutral: #6b7280;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; user-select: none; -webkit-tap-highlight-color: transparent;
            background: radial-gradient(ellipse at center, #0f0f2e 0%, #020210 100%);
            padding: 10px;
        }
        .game-container {
            width:100%; max-width:540px; display:flex; flex-direction:column; gap:8px;
            height:98vh; max-height:900px;
        }
        .top-bar {
            display:flex; justify-content:space-between; align-items:center;
            background: #1a1a3e; border-radius:14px; padding:8px 14px;
            border:1px solid #2a2a5a; color:#fff; font-weight:600; font-size:0.8rem;
        }
        .back-btn {
            background:#2a2a5a; border:1px solid #4a4a8a; color:#e2e8f0;
            padding:6px 14px; border-radius:18px; text-decoration:none;
            font-weight:600; letter-spacing:0.5px; font-size:0.75rem;
        }
        .resources {
            display:flex; gap:12px;
        }
        .res { color:#f59e0b; }

        .map-scroll {
            flex:1; background:#0b0b1e; border-radius:16px; border:1px solid #2a2a5a;
            overflow:auto; position:relative; touch-action:pan-x pan-y;
        }
        .map-grid {
            display:grid; grid-template-columns: repeat(8, 1fr);
            grid-auto-rows: minmax(50px, auto); gap:3px; padding:6px;
            min-width:600px; min-height:400px;
        }
        .province {
            background:#1e1e3e; border:2px solid #2a2a5a; border-radius:8px;
            cursor:pointer; transition:0.15s; display:flex; flex-direction:column;
            align-items:center; justify-content:center; font-size:0.55rem;
            color:#fff; position:relative; padding:4px;
        }
        .province.player { border-color:#3b82f6; background:#1a2a4a; }
        .province.ally { border-color:#22c55e; background:#1a2a2a; }
        .province.enemy { border-color:#ef4444; background:#2a1a1a; }
        .province.neutral { border-color:#6b7280; }
        .province.selected { box-shadow:0 0 12px #f59e0b; transform:scale(1.03); }
        .prov-name { font-weight:700; }
        .prov-info { font-size:0.5rem; color:#94a3b8; }
        .unit-stack { font-size:0.7rem; font-weight:700; }

        .panel {
            background:#1a1a3e; border-radius:14px; padding:10px; border:1px solid #2a2a5a;
            display:flex; flex-direction:column; gap:6px;
        }
        .panel-row { display:flex; gap:8px; flex-wrap:wrap; }
        .btn {
            background:#a855f7; color:#fff; border:none; padding:8px 12px; border-radius:10px;
            font-weight:700; cursor:pointer; font-size:0.7rem; letter-spacing:0.5px;
            transition:0.2s; flex:1; min-width:60px;
        }
        .btn:hover { background:#9333ea; box-shadow:0 0 15px rgba(168,85,247,0.5); }
        .btn:disabled { opacity:0.4; cursor:not-allowed; box-shadow:none; }
        .btn.enemy { background:#ef4444; }
        .btn.enemy:hover { background:#dc2626; }
        .info-text { color:#94a3b8; font-size:0.7rem; text-align:center; }
    </style>
</head>
<body>
<div class="game-container">
    <div class="top-bar">
        <a href="index.html" class="back-btn">← Home</a>
        <div class="resources">
            <span class="res">🛢️ <span id="oil">50</span></span>
            <span class="res">⚙️ <span id="steel">50</span></span>
            <span>💰 <span id="money">30</span></span>
            <span>🗺️ <span id="provCount">1</span>/<span id="totalProv">24</span></span>
        </div>
    </div>
    <div class="map-scroll" id="mapScroll">
        <div class="map-grid" id="mapGrid"></div>
    </div>
    <div class="panel">
        <div class="info-text" id="selectedDisplay">Select a province</div>
        <div class="panel-row" id="actionButtons"></div>
        <div class="panel-row">
            <button class="btn" id="recruitInf">🪖 Infantry (5🛢️ 5⚙️)</button>
            <button class="btn" id="recruitTank">🪖 Tank (15🛢️ 20⚙️)</button>
            <button class="btn" id="recruitBomber">✈️ Bomber (20🛢️ 15⚙️)</button>
        </div>
    </div>
</div>
<script>
    (function() {
        // Map: 8 columns x 6 rows = 48 provinces (simplified Europe)
        const COLS = 8, ROWS = 6, TOTAL = COLS*ROWS;
        const provinceNames = [
            "London","Paris","Berlin","Rome","Warsaw","Moscow","Madrid","Vienna",
            "Oslo","Stockholm","Athens","Budapest","Prague","Brussels","Amsterdam","Lisbon",
            "Copenhagen","Dublin","Belgrade","Bucharest","Sofia","Ankara","Kiev","Minsk",
            "Reykjavik","Helsinki","Zurich","Zagreb","Sarajevo","Tirana","Nicosia","Riga",
            "Vilnius","Tallinn","Ljubljana","Bratislava","Chisinau","Luxembourg","Monaco","Andorra",
            "SanMarino","Vatican","Malta","Gibraltar","Istanbul","Sevastopol","Stalingrad","Leningrad"
        ];

        // State
        let provinces = [];
        let selectedId = null;
        let playerGold = 30;   // money (used for everything or can be replaced by oil/steel)
        let oil = 50, steel = 50;
        let turn = 0;
        let playerFaction = 'player'; // could expand to multiple nations

        // Province object
        function initProvince(id) {
            let owner = 'neutral';
            // Starting territories: player owns some, enemy owns some
            if (id === 2) owner = 'player'; // Berlin area
            else if (id === 3 || id === 10 || id === 16) owner = 'enemy'; // Rome, Athens, Ankara
            else if (id === 1) owner = 'ally'; // Paris as ally
            // Neutral rest
            let units = [];
            if (owner === 'player') units = [{type:'inf', hp:10, atk:2, def:1}];
            else if (owner === 'enemy') units = [{type:'inf', hp:8, atk:2, def:1}];
            else if (owner === 'ally') units = [{type:'inf', hp:6, atk:2, def:1}];
            return {
                id, name: provinceNames[id] || `Province ${id}`,
                owner,
                units, // array of unit objects
                oilProd: 1, steelProd: 1, // per turn
            };
        }

        function createMap() {
            provinces = [];
            for (let i=0; i<TOTAL; i++) {
                provinces.push(initProvince(i));
            }
            selectedId = null;
            turn = 0;
            playerGold = 30; oil=50; steel=50;
            renderAll();
        }

        function getUnitIcon(type) {
            if (type==='inf') return '🪖';
            if (type==='tank') return '🪖'; // tank icon missing, use general
            if (type==='bomber') return '✈️';
            return '❓';
        }

        function renderAll() {
            renderMap();
            updateResources();
            updateSelectedInfo();
            updateActionButtons();
        }

        function renderMap() {
            const grid = document.getElementById('mapGrid');
            grid.innerHTML = '';
            provinces.forEach(prov => {
                const div = document.createElement('div');
                div.className = `province ${prov.owner}`;
                if (selectedId === prov.id) div.classList.add('selected');
                div.innerHTML = `
                    <span class="prov-name">${prov.name}</span>
                    <span class="unit-stack">${prov.units.length ? prov.units.map(u => getUnitIcon(u.type)).join('') : '·'}</span>
                `;
                div.addEventListener('click', () => selectProvince(prov.id));
                grid.appendChild(div);
            });
            document.getElementById('provCount').textContent = provinces.filter(p=>p.owner==='player').length;
            document.getElementById('totalProv').textContent = TOTAL;
        }

        function selectProvince(id) {
            selectedId = id;
            renderAll();
        }

        function updateResources() {
            document.getElementById('oil').textContent = Math.floor(oil);
            document.getElementById('steel').textContent = Math.floor(steel);
            document.getElementById('money').textContent = Math.floor(playerGold);
        }

        function updateSelectedInfo() {
            const display = document.getElementById('selectedDisplay');
            if (selectedId===null) {
                display.textContent = 'Select a province';
                return;
            }
            const prov = provinces[selectedId];
            let unitStr = prov.units.length ? prov.units.map(u => `${getUnitIcon(u.type)} (${u.hp}hp)`).join(', ') : 'none';
            display.textContent = `${prov.name} [${prov.owner}] | Units: ${unitStr}`;
        }

        function updateActionButtons() {
            const container = document.getElementById('actionButtons');
            container.innerHTML = '';
            if (selectedId === null) return;
            const prov = provinces[selectedId];
            if (prov.owner === 'player') {
                // Can move units, attack from here, or build
                const moveBtn = document.createElement('button');
                moveBtn.className = 'btn';
                moveBtn.textContent = '➡️ Move Units';
                moveBtn.addEventListener('click', () => moveUnits(selectedId));
                container.appendChild(moveBtn);
                const attackBtn = document.createElement('button');
                attackBtn.className = 'btn enemy';
                attackBtn.textContent = '⚔️ Attack from here';
                attackBtn.addEventListener('click', () => attackFrom(selectedId));
                container.appendChild(attackBtn);
            } else if (prov.owner === 'enemy' || prov.owner === 'neutral') {
                const attackBtn = document.createElement('button');
                attackBtn.className = 'btn enemy';
                attackBtn.textContent = '⚔️ Attack Province';
                attackBtn.addEventListener('click', () => attackProvince(selectedId));
                container.appendChild(attackBtn);
            }
            // Ally actions could be added
        }

        function isAdjacent(id1, id2) {
            const row1 = Math.floor(id1/COLS), col1 = id1%COLS;
            const row2 = Math.floor(id2/COLS), col2 = id2%COLS;
            return (Math.abs(row1-row2) + Math.abs(col1-col2)) === 1;
        }

        function getPlayerProvinceIds() {
            return provinces.filter(p=>p.owner==='player').map(p=>p.id);
        }

        // Move units from one player province to another adjacent player province
        function moveUnits(fromId) {
            const fromProv = provinces[fromId];
            if (fromProv.units.length === 0) return alert('No units to move.');
            const targets = getPlayerProvinceIds().filter(id => id !== fromId && isAdjacent(fromId, id));
            if (targets.length === 0) return alert('No adjacent friendly province to move to.');
            // Simple: move all units to first target
            const toProv = provinces[targets[0]];
            toProv.units = toProv.units.concat(fromProv.units);
            fromProv.units = [];
            selectedId = targets[0];
            renderAll();
        }

        function attackFrom(fromId) {
            const fromProv = provinces[fromId];
            if (fromProv.units.length === 0) return alert('No units to attack with.');
            // Find adjacent enemy/neutral
            const adjEnemyNeutral = provinces.filter(p => p.id !== fromId && isAdjacent(fromId, p.id) && (p.owner==='enemy'||p.owner==='neutral'));
            if (adjEnemyNeutral.length === 0) return alert('No adjacent enemy or neutral province.');
            // Attack first one
            const target = adjEnemyNeutral[0];
            executeBattle(fromProv, target);
        }

        function attackProvince(targetId) {
            const target = provinces[targetId];
            // Find adjacent player province with units
            const adjPlayer = getPlayerProvinceIds().filter(id => isAdjacent(id, targetId) && provinces[id].units.length>0);
            if (adjPlayer.length === 0) return alert('No adjacent province with units to attack from.');
            const fromProv = provinces[adjPlayer[0]];
            executeBattle(fromProv, target);
        }

        function executeBattle(attackerProv, defenderProv) {
            const atkUnits = attackerProv.units;
            const defUnits = defenderProv.units;
            let atkTotal = atkUnits.reduce((sum,u) => sum + u.atk, 0);
            let defTotal = defUnits.reduce((sum,u) => sum + u.def, 0);
            // Add some randomness
            atkTotal += Math.floor(Math.random()*5);
            defTotal += Math.floor(Math.random()*5);
            if (atkTotal > defTotal) {
                // Attacker wins, defender loses units, province changes
                defenderProv.units = [];
                defenderProv.owner = 'player';
                // transfer remaining attacker units (damaged)
                attackerProv.units = atkUnits.map(u => ({...u, hp: Math.max(1, u.hp-2)}));
                selectedId = defenderProv.id;
            } else {
                // Defender wins, attacker units take damage
                attackerProv.units = atkUnits.map(u => ({...u, hp: u.hp-3})).filter(u => u.hp>0);
                if (attackerProv.units.length === 0) alert('Attack failed, units destroyed.');
            }
            renderAll();
        }

        // Recruitment
        function recruit(type) {
            if (selectedId===null || provinces[selectedId].owner!=='player') return alert('Select a province you own.');
            const prov = provinces[selectedId];
            let costOil, costSteel;
            let unit;
            if (type === 'inf') { costOil=5; costSteel=5; unit = {type:'inf', hp:10, atk:2, def:1}; }
            else if (type === 'tank') { costOil=15; costSteel=20; unit = {type:'tank', hp:15, atk:5, def:3}; }
            else if (type === 'bomber') { costOil=20; costSteel=15; unit = {type:'bomber', hp:8, atk:6, def:1}; }
            if (oil < costOil || steel < costSteel) return alert('Not enough resources.');
            oil -= costOil; steel -= costSteel;
            prov.units.push(unit);
            renderAll();
        }

        document.getElementById('recruitInf').addEventListener('click', ()=>recruit('inf'));
        document.getElementById('recruitTank').addEventListener('click', ()=>recruit('tank'));
        document.getElementById('recruitBomber').addEventListener('click', ()=>recruit('bomber'));

        // AI turn and resource production (every 3 seconds)
        function aiTurn() {
            // Income
            provinces.forEach(p => {
                if (p.owner === 'player') { oil += p.oilProd; steel += p.steelProd; }
            });
            // Enemy AI: recruit and attack
            provinces.forEach(p => {
                if (p.owner === 'enemy') {
                    // chance to recruit
                    if (Math.random()<0.2 && oil>5 && steel>5) {
                        p.units.push({type:'inf', hp:10, atk:2, def:1});
                        oil -=5; steel-=5;
                    }
                }
            });
            // Enemy attack logic
            const enemyProvs = provinces.filter(p=>p.owner==='enemy' && p.units.length>0);
            enemyProvs.forEach(ep => {
                const adjTargets = provinces.filter(t => (t.owner==='player'||t.owner==='ally') && isAdjacent(ep.id, t.id));
                if (adjTargets.length>0 && Math.random()<0.3) {
                    const target = adjTargets[Math.floor(Math.random()*adjTargets.length)];
                    const atk = ep.units.reduce((s,u)=>s+u.atk,0);
                    const def = target.units.reduce((s,u)=>s+u.def,0);
                    if (atk > def) {
                        target.owner = 'enemy';
                        target.units = [];
                        ep.units = ep.units.map(u=>({...u, hp:u.hp-1})).filter(u=>u.hp>0);
                    } else {
                        ep.units = ep.units.map(u=>({...u, hp:u.hp-2})).filter(u=>u.hp>0);
                    }
                }
            });
            // Ally AI similar but less aggressive
            renderAll();
            checkVictory();
        }

        function checkVictory() {
            const playerCount = provinces.filter(p=>p.owner==='player').length;
            const enemyCount = provinces.filter(p=>p.owner==='enemy').length;
            if (playerCount >= TOTAL) { alert('Total Victory! You control everything.'); createMap(); }
            if (enemyCount >= TOTAL) { alert('Defeat. The enemy has overrun you.'); createMap(); }
        }

        setInterval(aiTurn, 4000);

        // Init
        createMap();
    })();
</script>
</body>
</html>
